services:
  postgres:
    image: postgres:16-alpine
    container_name: stockpromo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockpromo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stockpromo"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: stockpromo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockpromo-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    # Inside the container, localhost is NOT Postgres/Redis — override host .env.
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stockpromo?schema=public
      REDIS_HOST: redis
      LISTEN_HOST: 0.0.0.0
      STOCKTWITS_USER_DATA_DIR: /usr/src/app/artifacts/stocktwits-user-data
      # Host .env often sets Google Chrome paths; the Playwright image has no system Chrome.
      STOCKTWITS_BROWSER_BINARY: ""
      DISCORD_UI_BROWSER_BINARY: ""
      # .env sometimes sets 0 for local installs; Docker image ships browsers under /ms-playwright.
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      # Virtual display started by entrypoint.sh — keep Chrome headed so noVNC shows it.
      DISPLAY: ":99"
      STOCKTWITS_HEADLESS: "false"
    ports:
      - "3000:3000"
      - "6080:6080"
    volumes:
      - ./artifacts:/usr/src/app/artifacts

volumes:
  postgres_data:
  redis_data:
